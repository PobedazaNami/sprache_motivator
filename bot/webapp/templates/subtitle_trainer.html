<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Субтитри — Тренажер</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/css/subtitle_trainer.css">
</head>
<body>
<div id="app">

    <!-- Loading -->
    <div id="screen-loading" class="screen active">
        <div class="loader"></div>
        <p>Завантаження...</p>
    </div>

    <!-- Catalog screen (grid of videos) -->
    <div id="screen-catalog" class="screen">
        <div id="catalog-wrap">
            <div id="videos-head">
                <div>
                    <p class="videos-kicker">KURZGESAGT DE</p>
                    <h2 class="videos-title">Оберіть готове відео</h2>
                </div>
                <button type="button" id="reload-videos-btn">Оновити</button>
            </div>
            <p id="status-line" class="status-line"></p>
            <div id="videos-list" class="videos-list"></div>
        </div>
    </div>

    <!-- Player screen (full-screen video + subtitles) -->
    <div id="screen-player" class="screen">
        <div id="player-top-bar">
            <button type="button" id="back-btn">← Назад</button>
            <p id="player-title" class="player-title"></p>
        </div>
        <div id="player-area">
            <div id="yt-container">
                <div id="pause-overlay" style="display:none;">
                    <div id="pause-play-btn">▶</div>
                </div>
                <div id="yt-frame-wrap">
                    <div id="yt-player"></div>
                </div>
            </div>
            <div id="subtitle-overlay">
                <p id="subtitle-line"></p>
            </div>
        </div>

        <!-- Word popup -->
        <div id="word-popup" style="display:none;">
            <div class="popup-header">
                <div class="popup-title-wrap">
                    <span class="popup-kicker">ПОЯСНЕННЯ</span>
                    <h3 id="popup-word"></h3>
                </div>
                <button id="popup-close">✕</button>
            </div>
            <div id="popup-body">
                <!-- filled by JS -->
            </div>
        </div>

    </div><!-- /screen-player -->

</div><!-- /app -->

<script src="https://www.youtube.com/iframe_api"></script>
<script src="/static/js/subtitle_trainer.js"></script>
</body>
</html>
